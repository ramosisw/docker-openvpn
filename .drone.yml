kind: pipeline
name: build-arm

platform:
  os: linux
  arch: arm

steps:
  - name: build & push
    image: plugins/docker
    settings:
      dockerfile: ./Dockerfile
      repo: ramosisw/openvpn
      username: ramosisw
      tags: 
        - arm
      password:
        from_secret: docker_password
# trigger:
#   event:
#     - tag

---

kind: pipeline
name: build-amd64

platform:
  os: linux
  arch: amd64

steps:
  - name: build & push
    image: plugins/docker
    settings:
      dockerfile: ./Dockerfile
      repo: ramosisw/openvpn
      username: ramosisw
      tags: 
        - amd64
      password:
        from_secret: docker_password
# trigger:
#   event:
#     - tag

---

kind: pipeline
name: multiarch

steps:
  - name: pull tag and push
    image: docker:dind
    secrets: [ docker_password ]
    commands:
      - echo "$$DOCKER_PASSWORD" | docker --config . login --username ramosisw --password-stdin
      - docker pull ramosisw/openvpn
      - docker --config . manifest create ramosisw/openvpn ramosisw/openvpn:amd64 ramosisw/openvpn:arm
      - docker --config . manifest annotate --arch arm ramosisw/openvpn ramosisw/openvpn:arm
      - docker --config . manifest push ramosisw/openvpn

depends_on:
- build-arm
- build-amd64