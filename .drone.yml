### BUILD-ARM
kind: pipeline
name: build-arm

platform:
  os: linux
  arch: arm

steps:
  - name: build
    image: plugins/docker
    settings:
      dockerfile: ./Dockerfile
      repo: ramosisw/openvpn
      username: ramosisw
      password:
        from_secret: docker_password
      tags: dev-arm
    when:
      event: push

  - name: build & push
    image: plugins/docker
    settings:
      dockerfile: ./Dockerfile
      repo: ramosisw/openvpn
      username: ramosisw
      password:
        from_secret: docker_password
      tags: 
        - arm
        - ${DRONE_TAG}-arm
    when:
      event: tag

trigger:
  event:
    - tag
    - push

