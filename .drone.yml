kind: pipeline
name: build-arm

platform:
  os: linux
  arch: arm

steps:
  - name: push
    image: plugins/docker
    settings:
      dockerfile: ./Dockerfile
      repo: ramosisw/openvpn
      username: ramosisw
      tags: 
        - arm
        - $$TAG-arm
      password:
        from_secret: docker_password

trigger:
  event:
    - tag

---

