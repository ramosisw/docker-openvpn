kind: pipeline
name: build-arm

platform:
  os: linux
  arch: arm

steps:
  - name: push
    image: plugins/docker
    settings:
      repo: ramosisw/openvpn
      username: ramosisw
      tags: 
        - arm
        - devarm
      password:
        from_secret: docker_password

trigger:
  event:
    - tag
    - push

---

kind: pipeline
name: build-arm64

platform:
  os: linux
  arch: arm64

steps:
  - name: push
    image: plugins/docker
    settings:
      repo: ramosisw/openvpn
      username: ramosisw
      tags: 
        - arm64
        - devarm64
      password:
        from_secret: docker_password

trigger:
  event:
    - tag
    - push

---

kind: pipeline
name: build-amd64

platform:
  os: linux
  arch: amd64

steps:
  - name: push
    image: plugins/docker
    settings:
      repo: ramosisw/openvpn
      username: ramosisw
      tags: 
        - amd64
        - devamd64
      password:
        from_secret: docker_password

trigger:
  event:
    - tag
    - push

---

kind: pipeline
name: multiarch

steps:
  - name: manifest latest
    image: plugins/manifest
    settings:
      username: ramosisw
      password:
        from_secret: docker_password
      target: ramosisw/openvpn:latest
      template: ramosisw/openvpn:ARCH
      platforms:
        - linux/arm
        - linux/arm64
        - linux/amd64

  - name: manifest dev
    image: plugins/manifest
    settings:
      username: ramosisw
      password:
        from_secret: docker_password
      target: ramosisw/openvpn:dev
      template: ramosisw/openvpn:devARCH
      platforms:
        - linux/arm
        - linux/arm64
        - linux/amd64

trigger:
  event:
    - tag

depends_on:
 - build-arm
 - build-arm64
 - build-amd64