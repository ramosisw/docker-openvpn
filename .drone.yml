kind: pipeline
name: build-arm

platform:
  os: linux
  arch: arm

steps:
  - name: build and push
    image: plugins/docker
    settings:
      dockerfile: ./Dockerfile
      repo: ramosisw/openvpn
      username: ramosisw
      tags: 
        - arm
      password:
        from_secret: docker_password
# trigger:
#   event:
#     - tag

---

kind: pipeline
name: build-amd64

platform:
  os: linux
  arch: amd64

steps:
  - name: build and push
    image: plugins/docker
    settings:
      dockerfile: ./Dockerfile
      repo: ramosisw/openvpn
      username: ramosisw
      tags: 
        - amd64
      password:
        from_secret: docker_password
# trigger:
#   event:
#     - tag

---

kind: pipeline
name: multiarch

steps:
  - name: pull tag and push
    image: docker:dind
    environment:
      repo: ramosisw/openvpn
      username: ramosisw
      password:
        from_secret: docker_password
    commands:
      - export DOCKER_CLI_EXPERIMENTAL=enabled
      - "docker login --username ${username} --password $${password}
      - docker pull ${repo}:amd64
      - docker pull ${repo}:arm
      - docker manifest create ${repo} ${repo}:amd64 ${repo}:arm
      - docker manifest annotate --arch arm ${repo} ${repo}:arm
      - docker manifest push ${repo}

depends_on:
- build-arm
- build-amd64