kind: pipeline
name: build-arm

platform:
  os: linux
  arch: arm

steps:
  - name: build and push
    image: plugins/docker
    settings:
      dockerfile: ./Dockerfile
      repo: ramosisw/openvpn
      username: ramosisw
      tags: 
        - arm
      password:
        from_secret: docker_password
# trigger:
#   event:
#     - tag

---

kind: pipeline
name: build-amd64

platform:
  os: linux
  arch: amd64

steps:
  - name: build and push
    image: plugins/docker
    settings:
      dockerfile: ./Dockerfile
      repo: ramosisw/openvpn
      username: ramosisw
      tags: 
        - amd64
      password:
        from_secret: docker_password
# trigger:
#   event:
#     - tag

---

kind: pipeline
name: multiarch

steps:
  - name: pull tag and push
    image: docker
    environment:
      repo: ramosisw/openvpn"
      username: ramosisw
      password:
        from_secret: docker_password
    # volumes:
    #   - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - echo ${repo}
      - echo "${repo}"
      - export DOCKER_USERNAME=${username}
      - export DOCKER_PASSWORD=$${password}
      - export DOCKER_CLI_EXPERIMENTAL=enabled
      - docker login -u $$username -p $$password
      - docker pull ramosisw/openvpn:amd64
      - docker pull ramosisw/openvpn:arm
      - docker manifest create ramosisw/openvpn ramosisw/openvpn:amd64 ramosisw/openvpn:arm
      - docker manifest annotate --arch arm ramosisw/openvpn ramosisw/openvpn:arm
      - docker manifest push ramosisw/openvpn

depends_on:
 - build-arm
 - build-amd64