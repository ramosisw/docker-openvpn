kind: pipeline
name: build-arm

platform:
  os: linux
  arch: arm

steps:
  - name: push
    image: plugins/docker
    settings:
      dockerfile: ./Dockerfile
      repo: ramosisw/openvpn
      username: ramosisw
      tags: ${DRONE_TAG=nightly}-arm
      password:
        from_secret: docker_password

trigger:
  event: [ tag, push ]

---

kind: pipeline
name: build-arm64

platform:
  os: linux
  arch: arm64

steps:
  - name: push
    image: plugins/docker
    settings:
      dockerfile: ./Dockerfile
      repo: ramosisw/openvpn
      username: ramosisw
      tags: ${DRONE_TAG=nightly}-arm64
      password:
        from_secret: docker_password

trigger:
  event: [ tag, push ]

---

kind: pipeline
name: build-amd64

platform:
  os: linux
  arch: amd64

steps:
  - name: push
    image: plugins/docker
    settings:
      dockerfile: ./Dockerfile
      repo: ramosisw/openvpn
      username: ramosisw
      tags: ${DRONE_TAG=nightly}-amd64
      password:
        from_secret: docker_password

trigger:
  event: [ tag, push ]

---

kind: pipeline
name: multiarch

steps:
  - name: manifest latest
    image: plugins/manifest
    settings:
      username: ramosisw
      password:
        from_secret: docker_password
      target: ramosisw/openvpn:latest
      template: ramosisw/openvpn:${DRONE_TAG=nightly}-ARCH
      platforms:
        - linux/arm
        - linux/arm64
        - linux/amd64
    when:
      event: tag

  - name: manifest ${DRONE_TAG=nightly}
    image: plugins/manifest
    settings:
      username: ramosisw
      password:
        from_secret: docker_password
      target: ramosisw/openvpn:${DRONE_TAG=nightly}
      template: ramosisw/openvpn:${DRONE_TAG=nightly}-ARCH
      platforms:
        - linux/arm
        - linux/arm64
        - linux/amd64

trigger:
  event: [ tag, push ]

depends_on:
 - build-arm
 - build-arm64
 - build-amd64