---
### MULTIARCH
kind: pipeline
name: multiarch

steps:
  - name: manifest latest
    image: plugins/manifest
    settings:
      username: ramosisw
      password:
        from_secret: docker_password
      target: ramosisw/openvpn:dev
      template: ramosisw/openvpn:dev-ARCH
      platforms:
        - linux/arm
        - linux/arm64
        - linux/amd64
    when:
      event: push

  - name: manifest latest
    image: plugins/manifest
    settings:
      username: ramosisw
      password:
        from_secret: docker_password
      target: ramosisw/openvpn:latest
      template: ramosisw/openvpn:ARCH
      platforms:
        - linux/arm
        - linux/arm64
        - linux/amd64
    when:
      event: tag

  - name: manifest ${DRONE_TAG}
    image: plugins/manifest
    settings:
      username: ramosisw
      password:
        from_secret: docker_password
      target: ramosisw/openvpn:${DRONE_TAG}
      template: ramosisw/openvpn:${DRONE_TAG}-ARCH
      platforms:
        - linux/arm
        - linux/arm64
        - linux/amd64
    when:
      event: tag

trigger:
  event:
    - tag
    - push

depends_on:
 - build-arm
 - build-arm64
 - build-amd64
