---
kind: pipeline
name: dev-multiarch

steps:
  - name: manifest latest
    image: plugins/manifest
      password:
        from_secret: docker_password
    settings:
      username: ramosisw
      target: ramosisw/openvpn:dev
      template: ramosisw/openvpn:dev-ARCH
      platforms:
        - linux/arm
        # - linux/arm64
        # - linux/amd64

trigger:
  event:
    - push

depends_on:
 - dev-build-arm
#  - build-arm64
#  - build-amd64

---

kind: pipeline
name: multiarch

steps:
  - name: manifest latest
    image: plugins/manifest
      password:
        from_secret: docker_password
    settings:
      username: ramosisw
      target: ramosisw/openvpn:latest
      template: ramosisw/openvpn:ARCH
      platforms:
        - linux/arm
        - linux/arm64
        - linux/amd64

  - name: manifest ${DRONE_TAG}
    image: plugins/manifest
      password:
        from_secret: docker_password
    settings:
      username: ramosisw
      target: ramosisw/openvpn:${DRONE_TAG}
      template: ramosisw/openvpn:${DRONE_TAG}-ARCH
      platforms:
        - linux/arm
        - linux/arm64
        - linux/amd64

trigger:
  event:
    - tag

depends_on:
 - build-arm
 - build-arm64
 - build-amd64