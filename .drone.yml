kind: pipeline
name: build-arm

platform:
  os: linux
  arch: arm

steps:
  - name: build & push
    image: plugins/docker
    settings:
      dockerfile: ./Dockerfile
      repo: ramosisw/openvpn
      username: ramosisw
      tags: 
        - arm
      password:
        from_secret: docker_password
    when:
      event:
        - tag


