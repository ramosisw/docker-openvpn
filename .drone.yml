kind: pipeline
name: dev-build-arm

platform:
  os: linux
  arch: arm

steps:
  - name: push
    image: plugins/docker
    settings:
      dockerfile: ./Dockerfile
      repo: ramosisw/openvpn
      username: ramosisw
      password:
        from_secret: docker_password
      tags: 
        - 'dev-arm'

trigger:
  event:
    - push

---

kind: pipeline
name: build-arm

platform:
  os: linux
  arch: arm

steps:
  - name: push
    image: plugins/docker
    settings:
      dockerfile: ./Dockerfile
      repo: ramosisw/openvpn
      username: ramosisw
      tags: 
      password:
        from_secret: docker_password
        - arm
        - ${DRONE_TAG}-arm

trigger:
  event:
    - tag

