---

kind: pipeline
name: multiarch

steps:
  - name: manifest latest
    image: plugins/manifest
    settings:
      username: ramosisw
      password:
        from_secret: docker_password
      target: ramosisw/openvpn:latest
      template: ramosisw/openvpn:ARCH
      platforms:
        - linux/arm
        - linux/arm64
        - linux/amd64
        
  - name: manifest $$TAG
    image: plugins/manifest
    settings:
      username: ramosisw
      password:
        from_secret: docker_password
      target: ramosisw/openvpn:$$TAG
      template: ramosisw/openvpn:$$TAG-ARCH
      platforms:
        - linux/arm
        - linux/arm64
        - linux/amd64

trigger:
  event:
    - tag

depends_on:
 - build-arm
 - build-arm64
 - build-amd64